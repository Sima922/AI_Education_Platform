{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Course Editor{% endblock %}</title>
    
    <!-- Load Static Files -->
    <link rel="stylesheet" href="{% static 'css/course_editor.css' %}">

    <!-- External Libraries - CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- External Libraries - JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Messages Section -->
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    
    <!-- Hidden element to store URLs and CSRF token -->
    <div id="urls" 
         data-edit-draft-url="{% url 'courses:edit_course_draft' draft_id=draft.id %}"
         data-create-course-url="{% url 'courses:create_course' %}"
         style="display: none;">
    </div>
    <meta name="csrf-token" content="{{ csrf_token }}">

    <!-- Main Content -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Load JavaScript -->
    <script src="{% static 'js/course_editor.js' %}"></script>
    
    {% block extra_scripts %}{% endblock %}

    <!-- Initialize TinyMCE -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            tinymce.init({
                selector: '.tinymce-editor',
                plugins: 'lists link image table code help wordcount',
                toolbar: 'undo redo | styles | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image | code',
                menubar: false,
                skin: 'oxide',
                content_css: 'default',
                height: 300,
                setup: function(editor) {
                    editor.on('change', function () {
                        editor.save();
                    });
                }
            });
        });
    </script>
</body>
</html>
